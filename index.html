<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ff5f9e,#ff85b3,#ffc0cb);
text-align:center;
}

/* khung */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* tiêu đề */

h1{
color:white;
font-size:45px;
text-shadow:0 0 10px #ff4d88;
}

/* hộp quà */

#gift{
font-size:100px;
cursor:pointer;
transition:0.3s;
}

#gift:hover{
transform:scale(1.2);
}

/* chữ */

#message{
margin-top:25px;
font-size:22px;
color:white;
max-width:650px;
line-height:1.6;
}

/* hoa rơi */

.flower{
position:fixed;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

/* trái tim */

.heart{
position:fixed;
bottom:-10px;
font-size:24px;
animation:float 4s linear forwards;
}

@keyframes float{
to{
transform:translateY(-100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Chúc mừng ngày 8/3 🌸</h1>

<div id="gift" onclick="openGift()">🎁</div>

<div id="message"></div>

</div>

<script>

let text=`Chúc cô gái một ngày 8/3 luôn tươi như hoa, khỏe như voi và yêu đời như chim sẻ nhé. 
Luôn hạnh phúc, vui vẻ bên gia đình và bạn bè nhaaa, hăm chỉ một ngày này mà là mọi ngày trong năm lunnnn ❤️

Nếu thế giới này có 10 thiên thần: 5 thiên thần đang chơi đùa, 4 thiên thần đang nói chuyện và 1 thiên thần đang đọc. 
Mặc dù tui hăm biet nói những lời ngọt ngào, hợi ngại nhưng mà tui sẽ luôn ở đây và hi vọng sẽ lunn là người làm cho xtien vuii mỗi khi bùnnn.`

let i=0

function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i)
i++
setTimeout(typeWriter,40)
}
}

function openGift(){

document.getElementById("gift").innerHTML="💝"

typeWriter()

for(let i=0;i<25;i++){
createHeart()
}

}

/* hoa rơi */

function createFlower(){

const flower=document.createElement("div")

flower.className="flower"
flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"vw"
flower.style.fontSize=(15+Math.random()*25)+"px"
flower.style.animationDuration=(4+Math.random()*5)+"s"

document.body.appendChild(flower)

setTimeout(()=>{
flower.remove()
},8000)

}

setInterval(createFlower,300)

/* trái tim */

function createHeart(){

const heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},4000)

}

</script>

</body>
</html>
